catalog_template:
  bronze:
    naming_convention: "{env}_bronze"
    description: "Raw data ingestion layer - landing zone for all source data"
    storage_location: "abfss://bronze@{env}datalake.dfs.core.windows.net/"
    isolation_level: "catalog"
    managed_identity: "mi-databricks-bronze-{env}"
    schemas:
      - ingestion
      - raw_files
      - staging
      - archive
